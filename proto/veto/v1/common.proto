syntax = "proto3";

package veto.v1;

option go_package = "github.com/brett-caley/veto-protos/gen/go/veto/v1;vetov1";

import "google/protobuf/timestamp.proto";

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  optional string avatar_url = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Participant {
  string user_id = 1;
  string display_name = 2;
  optional string avatar_url = 3;
  google.protobuf.Timestamp joined_at = 4;
  bool is_connected = 5;
}

message SubmittedBy {
  string user_id = 1;
  string display_name = 2;
}

// Unset while session.phase == SESSION_PHASE_VOTING (anonymity during the elimination round —
// see VETO_MECHANICS.md §2). Present in SESSION_PHASE_LOBBY (The Board) and SESSION_PHASE_COMPLETE.
message Idea {
  string id = 1;
  string session_id = 2;
  string text = 3;
  optional string image_url = 4;
  optional SubmittedBy submitted_by = 5;
  optional int32 eliminated_in_round = 6;
  google.protobuf.Timestamp created_at = 7;
}

// A participant's veto state on one idea for one round. Presence of vetoed=true is the only
// signal — there is no explicit "keep" action (see VETO_MECHANICS.md §5, Raw Veto).
message Vote {
  string session_id = 1;
  string idea_id = 2;
  string user_id = 3;
  int32 round = 4;
  bool vetoed = 5;
  optional string comment = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// A single participant's vote, denormalized with display_name for reveal payloads
// (RoundResolved, WinnerRevealed, GetVetoTrail) where the client has no other way to resolve it.
message RevealedVote {
  string idea_id = 1;
  string user_id = 2;
  string display_name = 3;
  bool vetoed = 4;
  optional string comment = 5;
  // Tokens this participant poured on this idea for the resolved round. Always 0 under
  // VETO_STRATEGY_RAW (the boolean vetoed carries the signal there); the per-idea token
  // total under VETO_STRATEGY_TOKEN, so the reveal can show how hard an idea was hit.
  // See PLAN-10 / VETO_MECHANICS.md §5.
  int32 tokens_spent = 6;
}

// Per-session configuration for VETO_STRATEGY_TOKEN. Carried on CreateSessionRequest and
// honored only when veto_strategy == VETO_STRATEGY_TOKEN (ignored for other strategies).
// Defaults (tokens_per_round=10, max_tokens_per_idea=5) are placeholders pending the PLAN-10
// scoring spike; the shapes are stable regardless of the tuned values.
message TokenVetoConfig {
  // Tokens each participant receives per round. Refills every round — unspent tokens carry
  // no signal and do not roll over (VETO_MECHANICS.md §5). Must be >= 1. Defaults to 10 when unset.
  int32 tokens_per_round = 1;
  // Max tokens one participant may pour on a single idea in a round. Must be >= 1 and
  // <= tokens_per_round. Enforces the §5 fairness invariant — one participant's grudge cannot
  // unilaterally eliminate an idea. Defaults to 5 when unset.
  int32 max_tokens_per_idea = 2;
}

message Session {
  string id = 1;
  string code = 2;
  string title = 3;
  string host_id = 4;
  SessionPhase phase = 5;
  int32 current_round = 6;
  VetoStrategy veto_strategy = 7;
  Tempo tempo = 8;
  int32 target_round_count = 9;
  google.protobuf.Timestamp created_at = 10;
  optional google.protobuf.Timestamp completed_at = 11;
  Visibility visibility = 12;
}

message SessionDetail {
  Session session = 1;
  repeated Participant participants = 2;
  repeated Idea ideas = 3;
}

enum SessionPhase {
  SESSION_PHASE_UNSPECIFIED = 0;
  SESSION_PHASE_LOBBY = 1;
  SESSION_PHASE_VOTING = 2;
  SESSION_PHASE_COMPLETE = 3;
}

enum VetoStrategy {
  VETO_STRATEGY_UNSPECIFIED = 0;
  VETO_STRATEGY_RAW = 1;
  // Token Veto: each participant gets a per-round token pool (TokenVetoConfig) and pours tokens
  // on ideas to express intensity, capped per idea for fairness. Shares the §4 elimination path
  // with Raw Veto — only the scoring input differs (token sum vs. veto count). See PLAN-10.
  VETO_STRATEGY_TOKEN = 2;
  // Reserved. Session-scarce veto budget — a finite pool rationed across the whole session,
  // not refreshed per round. Not implemented; CreateSession rejects it. See PLAN-10 #4.
  VETO_STRATEGY_BUDGET = 3;
}

enum Tempo {
  TEMPO_UNSPECIFIED = 0;
  // Short round timer, no force-advance — round waits out the timer. See VETO_MECHANICS.md §6.
  TEMPO_QUICK_DECISION = 1;
  // Long/no round timer, host can ForceAdvanceRound. See VETO_MECHANICS.md §6.
  TEMPO_ONGOING = 2;
}

// Who can join a session. MVP honors only VISIBILITY_INVITE_ONLY (join by code).
// VISIBILITY_PUBLIC ("anyone nearby") is reserved for a future geo/presence-backed
// phase — CreateSession rejects it for now. See PLAN-00 reconciliation #2.
enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  VISIBILITY_INVITE_ONLY = 1;
  VISIBILITY_PUBLIC = 2; // reserved, not honored in MVP
}
